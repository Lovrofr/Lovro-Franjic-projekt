                <div class="form-item">
                    <label for="naslov">Naslov vijesti:</label>

                    <label for="tekst">Sadržaj vijesti:</label>
                    <textarea name="tekst" id="tekst" rows="8" required></textarea>
                </div>

                    <label for="kategorija">Kategorija:</label>
                    <select name="kategorija" id="kategorija" required>

                    </select>
                </div>

                <div class="form-item">
                    <label for="slika">Slika:</label>
                    <input type="file" name="slika" id="slika" accept="image/*">
                </div>

                <div class="form-item checkbox-item">
                    <label>
                        <input type="checkbox" name="arhiva">
                        Spremi u arhivu (ne prikazuj na naslovnici)
                    </label>
                </div>

                <div class="form-item gumbi">
                    <button type="reset">Poništi</button>
                    <button type="submit">Objavi vijest</button>
                </div>

            </form>
